<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>양털깎기</title>

<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/shearing.css">

</head>

<body>

<div class="game">

<div class="topBar">

<div class="timer">

⏰
<span id="time">60</span>

</div>

<div class="score">

🧶
<span id="woolCount">0</span>%

</div>

</div>

<div class="gameArea">

<img

id="afterSheep"

class="sheep"

src="../assets/sheep/shearing/shaved.png"

draggable="false"

>

<canvas

id="gameCanvas"

></canvas>

<img

id="clipper"

src="../assets/icons/clipper.png"

draggable="false"

>

</div>

<div class="bottomBar">

<div class="progressBox">

<div class="progress">

<div
id="progressFill"
class="progressFill">

</div>

</div>

<p>

진행률

<span id="percent">

0

</span>

%

</p>

</div>

<button

id="finishButton"

disabled>

완료

</button>

</div>

</div>

<script src="../js/shearing.js"></script>

</body>

</html>
