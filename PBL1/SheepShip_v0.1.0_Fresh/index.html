<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sleepy Sheep</title>

<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<header>

<h1>🐑 Sleepy Sheep</h1>

<div class="status">

<div class="card">

<span>경험치</span>

<h2 id="xpText">0</h2>

</div>

<div class="card">

<span>성장 단계</span>

<h2 id="growthText">

STEP 1

</h2>

</div>

<div class="card">

<span>양털</span>

<h2 id="woolText">

0g

</h2>

</div>

</div>

</header>

<main>

<div id="sheepArea">

<img id="growthImage" src="assets/sheep/growth/cleaned_final/growth_step_01.png" alt="Sleepy Sheep">

</div>

<div class="actionButtons">

<button id="petBtn">

🤍 쓰다듬기

</button>

<button id="feedBtn">

🥕 먹이주기

</button>

<button id="sleepBtn">

😴 잠자기

</button>

<button id="sleepMateBtn">

🛏 수면 메이트

</button>

</div>

<button

id="shearingBtn"

disabled>

✂ 양털 깎기

</button>

</main>

</div>

<script src="js/storage.js"></script>
<script src="js/sheep.js"></script>

<script>

document
.getElementById("sleepBtn")
.addEventListener("click",()=>{

addSleepXP();

});

document
.getElementById("petBtn")
.addEventListener("click",()=>{

alert("메에~ 🐑");

});

document
.getElementById("feedBtn")
.addEventListener("click",()=>{

alert("냠냠! 🥕");

});

// Sleep Mate popup + image viewer
document.getElementById('sleepMateBtn').addEventListener('click', ()=>{
	// create popup if not exists
	if (!document.getElementById('sleepMatePopup')){
		const pop = document.createElement('div');
		pop.id = 'sleepMatePopup';
		pop.innerHTML = `
			<div class="popupInner">
				<h3>나졸려 님의 침실</h3>
				<p>팝업을 눌러 방으로 이동하세요.</p>
				<img id="sleepThumb" src="assets/ui/sleep_room.png" alt="sleep room" />
				<div class="popupBtns">
					<button id="openRoom">입장</button>
					<button id="closePopup">닫기</button>
				</div>
			</div>
		`;
		document.body.appendChild(pop);
		document.getElementById('closePopup').addEventListener('click', ()=> pop.remove());
		document.getElementById('openRoom').addEventListener('click', ()=>{
			// open full-screen viewer
			const viewer = document.createElement('div');
			viewer.id = 'roomViewer';
					viewer.innerHTML = `<div class="viewerBg"></div><img src="assets/ui/sleep_room.png" class="viewerImg" alt="room" /><button id="closeViewer">닫기</button>`;
			document.body.appendChild(viewer);
			document.getElementById('closeViewer').addEventListener('click', ()=> viewer.remove());
		});
		// clicking thumbnail also opens viewer
		document.getElementById('sleepThumb').addEventListener('click', ()=> document.getElementById('openRoom').click());
	}
});

</script>

</body>

</html>
